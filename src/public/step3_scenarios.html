<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 3: Scenario Stories | AlWasl Workshop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(99, 102, 241, 0.05) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 3rem; }
        h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-muted); }

        .scenarios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 2rem;
        }

        .scenario-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .scenario-card:hover { 
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .badge {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            align-self: flex-start;
        }

        h2 { font-size: 1.75rem; color: #fff; }
        
        .story-text {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .signposts {
            background: rgba(15, 23, 42, 0.4);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .signpost-item {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            font-size: 0.85rem;
            color: var(--text);
        }

        .signpost-item::before { content: '→'; color: var(--primary); }

        .nav-btn {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 3rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .nav-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Step 3: The Four Futures</h1>
            <p class="subtitle">Detailed narratives of how the world could look in 2030.</p>
        </header>

        <div class="loader" id="loader" style="display: none; margin: 2rem auto; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-radius: 50%; border-top-color: var(--primary); animation: spin 1s linear infinite;"></div>
        <div class="scenarios-grid" id="scenariosContainer">
            <!-- Dynamic Content -->
        </div>

        <button class="nav-btn" id="nextBtn" style="display: none;" onclick="proceedToStep4()">Wind Tunnel Stress Test →</button>
        <button class="nav-btn" id="generateBtn" style="right: auto; left: 2rem;" onclick="generateScenarios()">Generate Detailed Stories</button>
    </div>

    <script>
        const company = JSON.parse(localStorage.getItem('workshop_company') || '{}');
        const axes = JSON.parse(localStorage.getItem('workshop_axes') || '{}');
        const forces = JSON.parse(localStorage.getItem('workshop_forces') || '[]');
        const history = JSON.parse(localStorage.getItem('workshop_history') || '[]');

        async function generateScenarios() {
            const container = document.getElementById('scenariosContainer');
            const loader = document.getElementById('loader');
            const genBtn = document.getElementById('generateBtn');
            const nextBtn = document.getElementById('nextBtn');

            loader.style.display = 'block';
            genBtn.disabled = true;
            genBtn.innerText = "Generating Stories...";

            try {
                const response = await fetch('/api/v1/workshop/scenarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        company,
                        axes,
                        forces,
                        existingScenarios: axes.scenarios, // Use preview names/summaries
                        conversationHistory: history
                    })
                });

                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('workshop_scenarios', JSON.stringify(result.data));
                    localStorage.setItem('workshop_history', JSON.stringify(result.history));
                    renderScenarios(result.data.scenarios);
                    nextBtn.style.display = 'block';
                    genBtn.innerText = "Regenerate Stories";
                }
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                loader.style.display = 'none';
                genBtn.disabled = false;
            }
        }

        function renderScenarios(scenarios) {
            const container = document.getElementById('scenariosContainer');
            container.innerHTML = scenarios.map(s => `
                <div class="scenario-card">
                    <div class="badge">${s.combination}</div>
                    <h2>${s.name}</h2>
                    <div>
                        <div class="section-title">The World Story</div>
                        <p class="story-text">${s.story}</p>
                    </div>
                    <div>
                        <div class="section-title">Strategic Implications</div>
                        <p class="story-text">${s.implications}</p>
                    </div>
                    <div class="signposts">
                        <div class="section-title">Early Warning Signposts</div>
                        ${s.signposts.map(sp => `<div class="signpost-item">${sp}</div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function proceedToStep4() {
            window.location.href = 'step4_windtunnel.html';
        }

        // Auto-generate if not already generated?
        // Or wait for user click. Let's wait for click as per Step 2.
    </script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    </div>
</body>
</html>
