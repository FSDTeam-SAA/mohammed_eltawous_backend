<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 4: Wind Tunneling | AlWasl Workshop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --excellent: #059669;
            --good: #10b981;
            --moderate: #f59e0b;
            --poor: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, rgba(239, 68, 68, 0.05) 0px, transparent 50%);
            color: var(--text);
            padding: 2rem;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: 0 auto; }
        header { margin-bottom: 2rem; }
        h1 { font-size: 2rem; font-weight: 800; }
        .subtitle { color: var(--text-muted); }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .options-input-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .option-field {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        input {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            color: #fff;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
        }

        .heatmap-container {
            display: none;
            overflow-x: auto;
            margin-top: 2rem;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px;
        }

        th {
            text-align: center;
            padding: 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        td {
            padding: 1.5rem;
            border-radius: 0.75rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            min-width: 180px;
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        td:hover { transform: scale(1.02); }

        .rating-excellent { background: rgba(5, 150, 105, 0.2); color: #6ee7b7; border-color: var(--excellent); }
        .rating-good { background: rgba(16, 185, 129, 0.15); color: #34d399; border-color: var(--good); }
        .rating-moderate { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border-color: var(--moderate); }
        .rating-poor { background: rgba(239, 68, 68, 0.2); color: #fca5a5; border-color: var(--poor); }

        .reasoning {
            display: block;
            font-size: 0.7rem;
            font-weight: 400;
            margin-top: 0.5rem;
            opacity: 0.8;
            line-height: 1.4;
        }

        .summary-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 3rem;
        }

        .summary-item {
            background: rgba(15, 23, 42, 0.4);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
        }

        .summary-item h4 {
            font-size: 0.8rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            color: var(--primary);
        }

        .move-pill {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Step 4: Wind Tunnel Stress Test</h1>
            <p class="subtitle">Test your strategic options against the 4 plausible futures.</p>
        </header>

        <section class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem;">
                <div>
                    <h3>Strategic Options to Test</h3>
                    <p class="subtitle" style="font-size: 0.8rem;">Edit manual options or ask AI for creative suggestions.</p>
                </div>
                <button style="background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); color: var(--primary);" id="suggestBtn" onclick="suggestOptions()">✨ AI: Suggest Options</button>
            </div>

            <div class="options-input-area" id="optionsContainer">
                <div class="option-field">
                    <input type="text" class="opt-input" placeholder="Option A..." value="Option A: Full digital platform build (AED 400M)">
                </div>
                <div class="option-field">
                    <input type="text" class="opt-input" placeholder="Option B..." value="Option B: Digitally enhanced relationship model (AED 120M)">
                </div>
                <div class="option-field">
                    <input type="text" class="opt-input" placeholder="Option C..." value="Option C: Stay the course (minimal digital investment)">
                </div>
            </div>
            <button id="runBtn" onclick="runWindTunnel()">Run Stress Test & Generate Conclusion</button>
        </section>

        <section class="heatmap-container" id="results">
            <table id="resultsTable">
                <thead>
                    <tr id="tableHeader">
                        <th style="text-align: left;">Strategic Option</th>
                        <!-- Scenarios will be injected here -->
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Results will be injected here -->
                </tbody>
            </table>

            <div class="summary-box" id="movesSummary">
                <!-- Moves will be injected here -->
            </div>

            <div class="conclusion-box" id="conclusionContainer" style="margin-top: 3rem; background: rgba(99, 102, 241, 0.1); border: 1px solid var(--primary); padding: 2rem; border-radius: 1rem; border-left: 5px solid var(--primary); display: none;">
                <h3 style="margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                    <span>🏆 Strategic Recommendation:</span>
                    <span id="recommendedOpt" style="color: #fff;"></span>
                </h3>
                <p id="conclusionText" style="font-style: italic; color: var(--text-muted); font-size: 1rem; margin: 0;"></p>
            </div>

            <div style="display: flex; justify-content: flex-end; margin-top: 3rem;">
                <button style="background: #10b981;" onclick="alert('Generating Final Report...')">Generate Executive Report →</button>
            </div>
        </section>
    </div>

    <script>
        async function suggestOptions() {
            const btn = document.getElementById('suggestBtn');
            const inputs = document.querySelectorAll('.opt-input');
            const runBtn = document.getElementById('runBtn');
            const originalText = btn.innerText;
            
            btn.innerText = "Consulting AI...";
            btn.disabled = true;

            try {
                // To suggest options, we call windtunnel with EMPTY options
                const response = await fetch('/api/v1/workshop/windtunnel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        company: { name: "AlWasl Capital" }, // Should be dynamic from state
                        scenarios: [ {name: "Velvet Cage"}, {name: "Gilded Souk"}, {name: "Digital Majlis"}, {name: "Golden Gateway"} ],
                        strategicOptions: [],
                        conversationHistory: []
                    })
                });

                const json = await response.json();
                const suggestions = json.data.generatedOptions;
                
                inputs.forEach((input, i) => {
                    if (suggestions[i]) input.value = suggestions[i];
                });

                btn.innerText = "✨ Suggestions Applied";
                setTimeout(() => btn.innerText = "✨ Suggest Again", 2000);
            } catch (e) {
                alert("Error getting suggestions: " + e.message);
                btn.innerText = originalText;
            } finally {
                btn.disabled = false;
            }
        }

        async function runWindTunnel() {
            const btn = document.getElementById('runBtn');
            const results = document.getElementById('results');
            const inputs = document.querySelectorAll('.opt-input');
            const options = Array.from(inputs).map(i => i.value).filter(v => v.trim());

            btn.innerText = "Simulating Scenarios...";
            btn.disabled = true;

            try {
                const response = await fetch('/api/v1/workshop/windtunnel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        company: { name: "AlWasl Capital" },
                        scenarios: [ {name: "The Velvet Cage"}, {name: "The Gilded Souk"}, {name: "The Digital Majlis"}, {name: "The Golden Gateway"} ],
                        strategicOptions: options,
                        conversationHistory: []
                    })
                });

                const json = await response.json();
                renderResults(json.data, options);
                results.style.display = 'block';
                window.scrollTo({ top: results.offsetTop - 50, behavior: 'smooth' });
            } catch (e) {
                alert("Analysis Error: " + e.message);
            } finally {
                btn.innerText = "Re-Run Analysis";
                btn.disabled = false;
            }
        }

        function renderResults(data, options) {
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            const summary = document.getElementById('movesSummary');
            const conclusion = document.getElementById('conclusionContainer');

            // Reset headers (keep first col)
            header.innerHTML = '<th style="text-align: left;">Strategic Option</th>' + 
                ['The Velvet Cage', 'The Gilded Souk', 'The Digital Majlis', 'The Golden Gateway']
                .map(s => `<th>${s}</th>`).join('');

            // Render rows
            body.innerHTML = options.map((opt, optIdx) => `
                <tr>
                    <td style="text-align: left; background: none; border: none; font-weight: 700;">${opt}</td>
                    ${data.windTunnel[optIdx].map(cell => `
                        <td class="rating-${cell.rating.toLowerCase()}">
                            ${cell.rating}
                            <span class="reasoning">${cell.reasoning}</span>
                        </td>
                    `).join('')}
                </tr>
            `).join('');

            // Render Summary
            summary.innerHTML = `
                <div class="summary-item">
                    <h4>No-Regret Moves</h4>
                    ${data.robustMoves.noRegret.map(m => `<div class="move-pill">${m}</div>`).join('')}
                </div>
                <div class="summary-item">
                    <h4>Hedge / Keep Open</h4>
                    ${data.robustMoves.keepOpen.map(m => `<div class="move-pill">${m}</div>`).join('')}
                </div>
                <div class="summary-item">
                    <h4>Decisions to Defer</h4>
                    ${data.robustMoves.defer.map(m => `<div class="move-pill">${m}</div>`).join('')}
                </div>
            `;

            // Render Conclusion
            document.getElementById('recommendedOpt').innerText = data.recommendedOption;
            document.getElementById('conclusionText').innerText = data.strategicConclusion;
            conclusion.style.display = 'block';
        }
    </script>
</body>
</html>
